items:
  - id: 0-3-2-workspace-schema-provenance-and-docs-site-localization
    version: 0.3.2
    title: Workspace schema provenance and docs-site localization
    summary: Patch release that unifies workspace schema provenance fields, records APCC CLI provenance explicitly, and completes metadata-driven plus runtime docs-site localization behavior.
    docPath: internal/versions/0-3-2-workspace-schema-provenance-and-docs-site-localization.md
    status: recorded
    decisionRefs: []
    highlights:
      - Replaces the split metadata `schemaVersion` naming with the canonical `workspaceSchemaVersion` field while keeping legacy reads compatible during repair and validation.
      - Adds `apccVersion` to workspace metadata so migrated or repaired workspaces record which APCC CLI version last managed them.
      - Makes zh-CN docs-site navigation fully metadata-driven by localizing section titles through `meta.json.title` and localizing runtime Console labels by `docsLanguage`.
      - Regenerates the public control-plane contract so direct `.apcc` editors have an authoritative schema/provenance reference that matches runtime validation.
      - Re-verifies package install, docs-site lifecycle, staged publish packages, and release-level build flows against the updated workspace contract.
    breakingChanges:
      - None.
    migrationNotes:
      - Existing workspaces with legacy `.apcc/meta/workspace.yaml.schemaVersion` should run `apcc doctor fix` to migrate to `workspaceSchemaVersion` and backfill `apccVersion`.
      - Docs-package section labels should be localized through directory `meta.json.title` instead of renaming `shared`, `public`, or `internal`.
      - Runtime Console labels now follow the workspace `docsLanguage`; re-stage or restart the docs site after upgrading if an old runtime is still cached.
    validationSummary: npm run check, npm run test, npm run build, npm run verify:package-install, npm run verify:site-lifecycle, npm run prepare:publish-package -- --out .tmp/apcc-publish-0.3.2, npm run prepare:publish-package -- --out .tmp/apcc-scoped-publish-0.3.2 --name @rendo-studio/apcc, npm pack --dry-run (apcc), npm pack --dry-run (@rendo-studio/apcc), npm run dev -- doctor check, npm run dev -- status, npm run generate:control-plane-contract-doc, GitHub release v0.3.2, npm publish apcc@0.3.2, npm publish @rendo-studio/apcc@0.3.2
    createdAt: 2026-04-29T00:00:00.000Z
    recordedAt: 2026-04-29T10:13:46Z
  - id: 0-3-1-agent-bootstrap-guidance-polish
    version: 0.3.1
    title: Agent bootstrap guidance polish
    summary: Patch release that removes redundant workflow-guide reread instructions, makes APCC CLI availability explicit in agent bootstrap assets, and keeps the canonical plus packaged guidance surfaces aligned.
    docPath: internal/versions/0-3-1-agent-bootstrap-guidance-polish.md
    status: recorded
    decisionRefs: []
    highlights:
      - Makes `apcc` availability an explicit prerequisite in `AGENTS.md` and the canonical agents template before workflow or control-plane commands are expected to work.
      - Treats `apcc guide workflow` as the preferred explicit workflow-reading path and stops telling agents to read both the CLI guide and the materialized skill copy.
      - Removes the misleading fallback that suggested agents could keep operating from the local skill copy when the APCC CLI itself was unavailable.
      - Keeps the canonical workflow skill and the materialized `.agents/skills/apcc-workflow/SKILL.md` plus `AGENTS.md` aligned on the same non-redundant bootstrap rules.
      - Re-verifies the staged package install path so published tarballs carry the updated workflow guidance surfaces.
    breakingChanges:
      - None.
    migrationNotes:
      - Development agents should ensure `apcc` is installed before invoking workflow or control-plane commands.
      - Prefer `apcc guide workflow` as the explicit bootstrap read path in environment-agnostic instructions.
      - If a skill-aware runtime has already injected the APCC workflow guide into context, do not reread the same guide for ritual.
    validationSummary: npm run check, npx vitest run test/guidance.test.ts test/workflow-guide.test.ts test/bootstrap.test.ts, npm run build, npm run dev -- site build, npm run verify:package-install, npm run verify:site-lifecycle, npm run dev -- doctor check, npm run dev -- status, npm run prepare:publish-package -- --out .tmp/apcc-publish, npm run prepare:publish-package -- --out .tmp/apcc-scoped-publish --name @rendo-studio/apcc, npm pack --dry-run, GitHub release v0.3.1, npm publish apcc@0.3.1, npm publish @rendo-studio/apcc@0.3.1
    createdAt: 2026-04-28T00:00:00.000Z
    recordedAt: 2026-04-28T21:15:07.8178035+08:00
  - id: 0-3-0-aclip-build-stage-and-control-plane-contract
    version: 0.3.0
    title: ACLIP build stage and control-plane contract
    summary: Minor release that adopts ACLIP's standard CLI build stage, hardens APCC's bundler-facing runtime surface, and formalizes the `.apcc` direct-edit contract as a generated and validated public guide.
    docPath: internal/versions/0-3-0-aclip-build-stage-and-control-plane-contract.md
    status: recorded
    decisionRefs: []
    highlights:
      - Builds the shipped CLI artifact through ACLIP's standard `build(...)` helper while preserving APCC's Markdown-first runtime behavior.
      - Makes package-root and version resolution bundler-safe across the CLI entrypoint, workflow guidance, packaged assets, and docs-site runtime helpers.
      - Publishes `apcc guide control-plane-contract` and generates the contract doc from runtime-backed constants instead of hand-maintained enum lists.
      - Extends doctor validation to reject unsupported persisted task, decision, version, and workspace-config values in directly edited `.apcc` workspaces.
      - Re-verifies installed-package behavior, staged publish packages, and docs-site lifecycle behavior against the new build-stage and contract surfaces.
    breakingChanges:
      - None.
    migrationNotes:
      - If you edit `.apcc/` directly, switch to `apcc guide control-plane-contract` as the authoritative persisted-field reference.
      - Replace unsupported direct-edit task statuses such as `todo` with `pending`, `in_progress`, `done`, or `blocked`.
      - If you change persisted value domains while maintaining APCC, rerun `npm run generate:control-plane-contract-doc`.
    validationSummary: npm run check, npm run test, npm run build, npm run verify:package-install, npm run verify:site-lifecycle, npm run dev -- guide, npm run dev -- guide control-plane-contract, npm run prepare:publish-package -- --out .tmp/apcc-publish, npm run prepare:publish-package -- --out .tmp/apcc-scoped-publish --name @rendo-studio/apcc, npm pack --dry-run, GitHub release v0.3.0, npm publish apcc@0.3.0, npm publish @rendo-studio/apcc@0.3.0
    createdAt: 2026-04-28T00:00:00.000Z
    recordedAt: 2026-04-28T06:45:25.4854719Z
  - id: 0-2-1-npm-publish-manifest-polish
    version: 0.2.1
    title: npm publish manifest polish
    summary: Patch release that removes the remaining npm publish warning by normalizing the packaged bin entry while keeping the APCC CLI surface unchanged.
    docPath: internal/versions/0-2-1-npm-publish-manifest-polish.md
    status: recorded
    decisionRefs: []
    highlights:
      - Normalizes the packaged `bin` entry so npm no longer rewrites it during publish.
      - Keeps the published `apcc` command name and installed binary behavior unchanged.
      - Re-verifies the package install, docs-site lifecycle, and publish-stage flows against the warning-free manifest.
    breakingChanges:
      - None.
    migrationNotes:
      - None for APCC users; this patch only removes npm publish noise and keeps the public CLI behavior unchanged.
    validationSummary: npm run check, npm run test, npm run build, npm run verify:package-install, npm run verify:site-lifecycle, npm run prepare:publish-package -- --out .tmp/apcc-publish, npm run prepare:publish-package -- --out .tmp/apcc-scoped-publish --name @rendo-studio/apcc, npm publish --dry-run, npm publish --dry-run --access public, GitHub release v0.2.1, npm publish apcc@0.2.1, npm publish @rendo-studio/apcc@0.2.1
    createdAt: 2026-04-28T00:00:00.000Z
