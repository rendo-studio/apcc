items:
  - id: 0-2-1-npm-publish-manifest-polish
    version: 0.2.1
    title: npm publish manifest polish
    summary: Patch release that removes the remaining npm publish warning by normalizing the packaged bin entry while keeping the APCC CLI surface unchanged.
    docPath: internal/versions/0-2-1-npm-publish-manifest-polish.md
    status: recorded
    decisionRefs: []
    highlights:
      - Normalizes the packaged `bin` entry so npm no longer rewrites it during publish.
      - Keeps the published `apcc` command name and installed binary behavior unchanged.
      - Re-verifies the package install, docs-site lifecycle, and publish-stage flows against the warning-free manifest.
    breakingChanges:
      - None.
    migrationNotes:
      - None for APCC users; this patch only removes npm publish noise and keeps the public CLI behavior unchanged.
    validationSummary: npm run check, npm run test, npm run build, npm run verify:package-install, npm run verify:site-lifecycle, npm run prepare:publish-package -- --out .tmp/apcc-publish, npm run prepare:publish-package -- --out .tmp/apcc-scoped-publish --name @rendo-studio/apcc, npm publish --dry-run, npm publish --dry-run --access public, GitHub release v0.2.1, npm publish apcc@0.2.1, npm publish @rendo-studio/apcc@0.2.1
    createdAt: 2026-04-28T00:00:00.000Z
    recordedAt: 2026-04-27T23:25:14.4769183Z
  - id: 0-2-0-doctor-and-workflow-skill-standardization
    version: 0.2.0
    title: Doctor and workflow skill standardization
    summary: First minor release after 0.1.2 that standardizes workspace diagnostics on ACLIP doctor surfaces, aligns the APCC workflow guide with canonical skill-package export hooks, and finalizes the current docs-site and scaffold ergonomics changes.
    docPath: internal/versions/0-2-0-doctor-and-workflow-skill-standardization.md
    status: recorded
    decisionRefs: []
    highlights:
      - Replaces the legacy `apcc validate` command with the ACLIP-standard `apcc doctor check` and `apcc doctor fix` surfaces, with slimmer Markdown output and cleaner JSON payloads.
      - Standardizes the workflow guide as a canonical skill package at `assets/skills/apcc-workflow/SKILL.md`, registers it through ACLIP CLI skill hooks, and keeps `init` plus `guide workflow` aligned to that source.
      - Keeps docs-site runtime wording on the `site start` and `site status` surface, makes the root locale routing respect the workspace docs language, and preserves live runtime collaboration ergonomics.
      - Uses `meta.json` rather than `.gitkeep` for scaffolded docs package placeholders and reading-order metadata across the repository docs directories.
      - Verifies the installed-package binary, deployable docs-site build, and lifecycle flows against the current command surface before release.
    breakingChanges:
      - `apcc validate` has been removed; use `apcc doctor check` and `apcc doctor fix`.
      - `apcc site open` has been removed; use `apcc site start`.
    migrationNotes:
      - Update any automation or documentation that still shells out to `apcc validate` so it calls the doctor surface instead.
      - Update any scripts or habits using `apcc site open` to `apcc site start`.
      - If you consume the workflow skill package as a source artifact, use `assets/skills/apcc-workflow/SKILL.md` as the canonical source path.
    validationSummary: npm run check, npm run test, npm run build, npm run verify:package-install, npm run verify:site-lifecycle, npm run prepare:publish-package -- --out .tmp/apcc-publish, npm run prepare:publish-package -- --out .tmp/apcc-scoped-publish --name @rendo-studio/apcc, npm pack --dry-run, GitHub release v0.2.0, npm publish apcc@0.2.0, npm publish @rendo-studio/apcc@0.2.0
    createdAt: 2026-04-28T00:00:00.000Z
    recordedAt: 2026-04-27T23:01:58.4663767Z
  - id: 0-1-0-apcc-public-baseline
    version: 0.1.0
    title: APCC public baseline
    summary: Establishes the first APCC public baseline with a clean workspace model, formal docs package, project-level governance records, and one primary docs language per workspace.
    docPath: internal/versions/0-1-0-apcc-public-baseline.md
    status: recorded
    decisionRefs: []
    highlights:
      - Establishes APCC as a agent-first project context framework with a clean `.apcc` workspace root and public docs package.
      - Clarifies that APCC is the framework while the structured project context control plane is the role it gives a repository.
      - Persists one primary docs language per workspace and scaffolds the shared docs anchors in that language.
      - Ships the local docs site as a shared prebuilt viewer shell backed by runtime data instead of a per-project source runtime.
      - Verifies the npm package install path so the package-manager generated `apcc` binary can initialize and validate a workspace.
      - Makes `apcc guide` a dynamic index over bundled `docs/public` topics while reserving `apcc guide workflow` for the Agent workflow guide.
      - Reduces plan and task mutation output to concise deltas and allows explicit plan/task ids for stable follow-up references.
    breakingChanges:
      - None for public APCC users in this baseline.
    migrationNotes:
      - Choose one primary docs language per repository and keep authored docs in that language unless a human explicitly asks for something else.
      - Update `.apcc` before implementation whenever a new task or plan shift is confirmed.
    validationSummary: npm run check, npm run test, npm run build, npm run verify:package-install, npm run dev -- guide, npm run dev -- guide workflow, npm run dev -- validate, npm run dev -- status show, npm run dev -- site build, npm run verify:site-lifecycle
    createdAt: 2026-04-23T00:00:00.000Z
    recordedAt: 2026-04-23T00:00:00.000Z
  - id: 0-1-2-docs-site-ergonomics-patch
    version: 0.1.2
    title: Docs-site ergonomics patch
    summary: Patch release that fixes localized docs-site routing, makes the Console the default landing surface, adds explicit site-open port selection, and tightens agent workflow guidance around site lifecycle.
    docPath: null
    status: recorded
    decisionRefs: []
    highlights:
      - Fixes localized docs-site routing for non-ASCII authored filenames
      - Makes the localized Console plan view the default docs-site landing surface
      - Adds apcc site open --port for stable per-open docs-site addresses
      - Tightens agent workflow guidance to report docs-site URLs and avoid unprompted site stop
    breakingChanges: []
    migrationNotes:
      - Agents should prefer a stable unique docs-site port on first open and tell humans the returned URL
      - Existing docs-site consumers should treat /console/plans as the canonical execution view
    validationSummary: npm run check, npm run test, npm run build, npm run verify:site-lifecycle, npm run verify:package-install, npm pack --dry-run, node dist/bin/apcc.js site open --help
    createdAt: 2026-04-25T01:17:45.162Z
    recordedAt: 2026-04-25T01:26:16.372Z
