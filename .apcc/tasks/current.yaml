    planRef: align-maintainer-docs-and-verification-1
    parentTaskId: task-maintainer-docs
    countedForProgress: true
  - id: task-public-positioning
    name: Finalize APCC public positioning
    summary: Rename the framework surfaces and align release-facing docs and records around the APCC name.
